name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vietnamese text check
        run: npm run lint:i18n

      - name: Build
        run: npm run build
